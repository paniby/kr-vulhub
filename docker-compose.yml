services:
  web:
    image: vulhub/langflow:1.2.0
    ports:
      - "7860:7860"
    environment:
      - LANGFLOW_HOST=0.0.0.0
      - LANGFLOW_AUTO_LOGIN=false
      - LANGFLOW_SUPERUSER=administrator
      - LANGFLOW_SUPERUSER_PASSWORD=vulhub
      - DO_NOT_TRACK=true
      - GIT_PYTHON_REFRESH=quiet
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; response = urllib.request.urlopen('http://127.0.0.1:7860/health_check', timeout=5); raise SystemExit(0 if response.status == 200 else 1)"
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s
  
  poc:
    build: ./poc
    depends_on:
      web:
        condition: service_healthy
    environment:
      TARGET_URL: "http://web:7860"
      MAX_RETRIES: "30"
      RETRY_INTERVAL: "5"
      
